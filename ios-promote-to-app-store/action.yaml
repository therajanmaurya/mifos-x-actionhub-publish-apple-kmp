# Sub-action: ios-promote-to-app-store — Stage 3 (TF → App Store, no rebuild)
# 🆕 NEW preferred Stage 3 path.
# Consumer Fastfile lane: ios promoteToAppStore
name: 'KMP Publish Apple — iOS Promote TF → App Store (Stage 3 — no rebuild)'
description: 'Submit existing TF build to App Store review. No rebuild.'
author: 'Mifos Initiative'
branding: { icon: 'check-circle', color: 'red' }

inputs:
  ios_package_name:   { required: true, description: 'iOS module name' }
  appstore_key_id:    { required: true, description: 'ASC API key ID' }
  appstore_issuer_id: { required: true, description: 'ASC issuer ID' }
  appstore_auth_key:  { required: true, description: 'Base64 .p8' }
  build_number:       { required: false, default: '', description: 'Explicit TF build to promote. Default: latest.' }

runs:
  using: 'composite'
  steps:
    - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f  # v1.232.0
      with: { bundler-cache: true }

    - name: Materialize ASC API key
      shell: bash
      env: { APPSTORE_AUTH_KEY_B64: '${{ inputs.appstore_auth_key }}' }
      run: bash "$GITHUB_ACTION_PATH/../_shared/scripts/setup-asc-api.sh"

    - name: Promote TF → App Store
      shell: bash
      env:
        APPSTORE_KEY_ID:    ${{ inputs.appstore_key_id }}
        APPSTORE_ISSUER_ID: ${{ inputs.appstore_issuer_id }}
        BUILD_NUMBER:       ${{ inputs.build_number }}
      run: bundle exec fastlane ios promoteToAppStore

    - name: Cleanup
      if: always()
      shell: bash
      run: rm -rf secrets
