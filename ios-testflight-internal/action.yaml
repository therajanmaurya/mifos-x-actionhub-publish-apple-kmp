# Sub-action: ios-testflight-internal — Stage 1 (TF Internal)
# Part of openMF/mifos-x-actionhub-publish-apple-kmp@v2.0.9
name: 'KMP Publish Apple — iOS TestFlight Internal (Stage 1)'
description: 'Build signed IPA + upload to TestFlight. Internal testers see it immediately.'
author: 'Mifos Initiative'
branding: { icon: 'upload', color: 'blue' }

inputs:
  ios_package_name:      { required: true,  description: 'iOS module name' }
  shared_module:         { required: true,  description: 'KMP shared module path' }
  use_cocoapods:         { required: false, default: 'false', description: 'Install CocoaPods' }
  mode:                  { required: false, default: 'standard', description: "'standard' or 'pre-materialized'" }
  fastlane_cwd:          { required: false, default: '.',       description: 'Working dir for fastlane' }
  appstore_key_id:       { required: false, default: '', description: 'Ignored when mode=pre-materialized.' }
  appstore_issuer_id:    { required: false, default: '', description: 'Ignored when mode=pre-materialized.' }
  appstore_auth_key:     { required: false, default: '', description: 'Ignored when mode=pre-materialized.' }
  match_password:        { required: false, default: '', description: 'Ignored when mode=pre-materialized.' }
  match_git_private_key: { required: false, default: '', description: 'Ignored when mode=pre-materialized.' }

runs:
  using: 'composite'
  steps:
    - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f  # v1.232.0
      with:
        bundler-cache: true
        working-directory: ${{ inputs.fastlane_cwd }}

    # ─── STANDARD MODE ─────────────────────────────────────────────────────
    - name: Materialize Apple secrets (standard mode)
      if: ${{ inputs.mode == 'standard' }}
      shell: bash
      env:
        APPSTORE_AUTH_KEY_B64: ${{ inputs.appstore_auth_key }}
        MATCH_GIT_PRIVATE_KEY: ${{ inputs.match_git_private_key }}
      run: bash "$GITHUB_ACTION_PATH/../_shared/scripts/materialize-apple-secrets.sh"

    - name: Upload to TestFlight (standard mode)
      if: ${{ inputs.mode == 'standard' }}
      shell: bash
      env:
        MATCH_PASSWORD:     ${{ inputs.match_password }}
        APPSTORE_KEY_ID:    ${{ inputs.appstore_key_id }}
        APPSTORE_ISSUER_ID: ${{ inputs.appstore_issuer_id }}
      run: bundle exec fastlane ios beta

    - name: Cleanup (standard mode)
      if: ${{ always() && inputs.mode == 'standard' }}
      shell: bash
      run: rm -rf secrets

    # ─── PRE-MATERIALIZED MODE ─────────────────────────────────────────────
    - name: Upload to TestFlight (pre-materialized mode)
      if: ${{ inputs.mode == 'pre-materialized' }}
      shell: bash
      working-directory: ${{ inputs.fastlane_cwd }}
      run: bundle exec fastlane ios beta
