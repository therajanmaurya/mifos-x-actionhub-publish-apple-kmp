# Sub-action: ios-firebase-distribution — Stage 0 dev/QA
# Part of openMF/mifos-x-actionhub-publish-apple-kmp@v2.0.9
#
# Modes (since v2.0.9):
#   standard         — action materializes secrets, invokes fastlane lane
#                      (assumes root-level fastlane/Fastfile with `platform :ios`).
#   pre-materialized — caller has already materialized secrets and set env vars
#                      before this action runs. Action just CDs to `fastlane_cwd`
#                      and runs `bundle exec fastlane ios <lane>` — lane reads
#                      everything from env (RULE-DEPLOYMENT-MANIFEST-001
#                      `deployment/<platform>/<target>/lane.rb` layout).
name: 'KMP Publish Apple — iOS Firebase Distribution (Stage 0)'
description: 'Build signed IPA + upload to Firebase App Distribution.'
author: 'Mifos Initiative'
branding: { icon: 'send', color: 'orange' }

inputs:
  ios_package_name:      { required: true,  description: 'iOS module name' }
  shared_module:         { required: true,  description: 'KMP shared module path' }
  use_cocoapods:         { required: false, default: 'false', description: 'Install CocoaPods' }
  mode:                  { required: false, default: 'standard', description: "'standard' or 'pre-materialized'" }
  fastlane_cwd:          { required: false, default: '.',       description: 'Working dir for fastlane (set to `deployment` for RULE-DEPLOYMENT-MANIFEST-001 layout)' }
  appstore_key_id:       { required: false, default: '', description: 'ASC API key ID. Ignored when mode=pre-materialized.' }
  appstore_issuer_id:    { required: false, default: '', description: 'ASC issuer ID. Ignored when mode=pre-materialized.' }
  appstore_auth_key:     { required: false, default: '', description: 'Base64 .p8. Ignored when mode=pre-materialized.' }
  match_password:        { required: false, default: '', description: 'Match passphrase. Ignored when mode=pre-materialized.' }
  match_git_private_key: { required: false, default: '', description: 'SSH key for Match repo. Ignored when mode=pre-materialized.' }
  firebase_creds:        { required: false, default: '', description: 'Base64 Firebase SA JSON. Ignored when mode=pre-materialized.' }
  tester_groups:         { required: true,  description: 'Comma-separated Firebase tester groups' }

runs:
  using: 'composite'
  steps:
    - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f  # v1.232.0
      with:
        bundler-cache: true
        working-directory: ${{ inputs.fastlane_cwd }}

    # ─── STANDARD MODE ─────────────────────────────────────────────────────
    - name: Materialize Apple secrets + Firebase creds (standard mode)
      if: ${{ inputs.mode == 'standard' }}
      shell: bash
      env:
        APPSTORE_AUTH_KEY_B64: ${{ inputs.appstore_auth_key }}
        MATCH_GIT_PRIVATE_KEY: ${{ inputs.match_git_private_key }}
        FIREBASE_CREDS_B64:    ${{ inputs.firebase_creds }}
      run: bash "$GITHUB_ACTION_PATH/../_shared/scripts/materialize-apple-secrets.sh" --firebase

    - name: Deploy to Firebase (standard mode)
      if: ${{ inputs.mode == 'standard' }}
      shell: bash
      env:
        MATCH_PASSWORD:     ${{ inputs.match_password }}
        APPSTORE_KEY_ID:    ${{ inputs.appstore_key_id }}
        APPSTORE_ISSUER_ID: ${{ inputs.appstore_issuer_id }}
        FIREBASE_GROUPS:    ${{ inputs.tester_groups }}
      run: bundle exec fastlane ios deploy_on_firebase

    - name: Cleanup (standard mode)
      if: ${{ always() && inputs.mode == 'standard' }}
      shell: bash
      run: rm -rf secrets

    # ─── PRE-MATERIALIZED MODE ─────────────────────────────────────────────
    - name: Deploy to Firebase (pre-materialized mode)
      if: ${{ inputs.mode == 'pre-materialized' }}
      shell: bash
      working-directory: ${{ inputs.fastlane_cwd }}
      env:
        FIREBASE_GROUPS: ${{ inputs.tester_groups }}
      run: bundle exec fastlane ios deploy_on_firebase

    # ─── ARTIFACT UPLOAD (both modes) ──────────────────────────────────────
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with: { name: firebase-ios-ipa, path: '**/build/**/*.ipa' }
