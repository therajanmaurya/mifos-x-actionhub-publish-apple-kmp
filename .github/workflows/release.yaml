# .github/workflows/release-apple.yaml
#
# ADDITIVE — reusable workflow for Apple platforms (iOS or macOS) promotion ladder.
# Companion to existing iOS/macOS workflows. Existing workflows UNCHANGED.
#
# Promotion model (uniform across iOS + macOS, switched by `platform` input):
#   Stage 0 (firebase)        — out-of-band dev/QA (iOS only; macOS skips)
#   Stage 1 (internal)        — TestFlight Internal, 1 reviewer required
#   Stage 2 (beta)            — TestFlight External (Apple beta review ~24h), 1 reviewer
#   Stage 3 (production)      — App Store / Mac App Store (Apple review 1-3d), 2 reviewers + wait
name: Release · Apple (ladder)
run-name: "🍎 Release ${{ inputs.platform }} ${{ inputs.version_tag }} · ladder→${{ inputs.starting_rung }}"

on:
  workflow_call:
    inputs:
      platform:
        description: "Platform: ios | mac"
        required: true
        type: string
      package_name:
        description: 'Gradle module (e.g. cmp-ios or cmp-desktop)'
        required: true
        type: string
      shared_module:
        description: 'KMP shared module path (e.g. cmp-shared)'
        required: true
        type: string
      version_tag:
        description: 'Version tag'
        required: true
        type: string
      starting_rung:
        description: "Resume from: firebase | internal | beta | production"
        required: false
        type: string
        default: 'internal'
      tester_groups:
        description: 'Firebase tester groups (comma-separated, Stage 0 firebase only)'
        required: false
        type: string
        default: 'ios-internal,beta-testers'
      mode:
        description: "'standard' (default) or 'pre-materialized' — only honored by iOS Stage 0/1 in v2.0.10; later stages ignore."
        required: false
        type: string
        default: 'standard'
      fastlane_cwd:
        description: 'Working dir for fastlane (default `.`; set to `deployment` for RULE-DEPLOYMENT-MANIFEST-001 layout)'
        required: false
        type: string
        default: '.'
      pre_fastlane_script:
        description: 'Optional bash to run after checkout, before composite action (used in pre-materialized mode for consumer secrets-pull etc.)'
        required: false
        type: string
        default: ''
      runner_pool:
        description: 'JSON array of runner labels for ALL jobs. Default `["macos-14"]` (hosted Mac — required for Xcode). Pass `["self-hosted","macOS"]` to dispatch on a self-hosted Mac runner.'
        required: false
        type: string
        default: '["macos-14"]'

    secrets:
      appstore_key_id:           { required: false }
      appstore_issuer_id:        { required: false }
      appstore_auth_key:         { required: false }
      match_password:            { required: false }
      match_ssh_private_key:     { required: false }  # caller passes this name; mapped internally to match_git_private_key for composite actions (v2.0.7+ alias)
      firebase_creds:            { required: false }
      SOPS_AGE_KEY:              { required: false }

concurrency:
  group: release-apple-${{ inputs.platform }}
  cancel-in-progress: true

jobs:
  # Preflight: validate required secrets per rung — fail-fast in ~8s instead of
  # dying deep in Xcode build / Fastlane Match after 10+ min with a confusing error.
  # Skipped in mode=pre-materialized (consumer manages secrets via pre_fastlane_script).
  validate-secrets:
    name: Preflight · Validate required secrets
    if: ${{ inputs.mode == 'standard' }}
    runs-on: ${{ fromJSON(inputs.runner_pool) }}
    steps:
      - name: Check apple/match secrets
        env:
          appstore_key_id:       ${{ secrets.appstore_key_id }}
          appstore_issuer_id:    ${{ secrets.appstore_issuer_id }}
          appstore_auth_key:     ${{ secrets.appstore_auth_key }}
          match_password:        ${{ secrets.match_password }}
          match_ssh_private_key: ${{ secrets.match_ssh_private_key }}
          firebase_creds:        ${{ secrets.firebase_creds }}
        run: |
          MISSING=()
          [[ -z "${appstore_key_id:-}" ]]       && MISSING+=("appstore_key_id")
          [[ -z "${appstore_issuer_id:-}" ]]    && MISSING+=("appstore_issuer_id")
          [[ -z "${appstore_auth_key:-}" ]]     && MISSING+=("appstore_auth_key")
          [[ -z "${match_password:-}" ]]        && MISSING+=("match_password")
          [[ -z "${match_ssh_private_key:-}" ]] && MISSING+=("match_ssh_private_key")

          if [[ "${{ inputs.platform }}" == "ios" && "${{ inputs.starting_rung }}" == "firebase" ]]; then
            [[ -z "${firebase_creds:-}" ]] && MISSING+=("firebase_creds")
          fi

          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "❌ Apple ${{ inputs.platform }} ladder→${{ inputs.starting_rung }} requires these secrets, but they are MISSING:"
            printf '   - %s\n' "${MISSING[@]}"
            echo ""
            echo "Set them in your repo's Settings → Secrets and variables → Actions:"
            for s in "${MISSING[@]}"; do echo "   gh secret set $s --repo \${{ github.repository }}"; done
            exit 1
          fi
          echo "✅ Apple ${{ inputs.platform }} secrets present"

  stage-0-firebase:
    name: Stage 0 — Firebase App Distribution (iOS only)
    needs: [validate-secrets]
    if: ${{ always() && !failure() && !cancelled() && inputs.platform == 'ios' && contains(fromJSON('["firebase","internal","beta","production"]'), inputs.starting_rung) }}
    runs-on: ${{ fromJSON(inputs.runner_pool) }}
    environment: ios-firebase
    env:
      SOPS_AGE_KEY:          ${{ secrets.SOPS_AGE_KEY }}
      APPSTORE_KEY_ID:       ${{ secrets.appstore_key_id }}
      APPSTORE_ISSUER_ID:    ${{ secrets.appstore_issuer_id }}
      APPSTORE_AUTH_KEY_B64: ${{ secrets.appstore_auth_key }}
      MATCH_PASSWORD:        ${{ secrets.match_password }}
      MATCH_GIT_PRIVATE_KEY: ${{ secrets.match_ssh_private_key }}
      FIREBASE_CREDS_B64:    ${{ secrets.firebase_creds }}
    steps:
      - uses: actions/checkout@v4

      - name: Pre-fastlane setup (consumer-provided, pre-materialized mode)
        if: ${{ inputs.mode == 'pre-materialized' && inputs.pre_fastlane_script != '' }}
        shell: bash
        run: ${{ inputs.pre_fastlane_script }}

      - name: Publish to Firebase
        uses: therajanmaurya/mifos-x-actionhub-publish-apple-kmp/ios-firebase-distribution@v2.0.12
        with:
          ios_package_name:      ${{ inputs.package_name }}
          shared_module:         ${{ inputs.shared_module }}
          mode:                  ${{ inputs.mode }}
          fastlane_cwd:          ${{ inputs.fastlane_cwd }}
          appstore_key_id:       ${{ secrets.appstore_key_id }}
          appstore_issuer_id:    ${{ secrets.appstore_issuer_id }}
          appstore_auth_key:     ${{ secrets.appstore_auth_key }}
          match_password:        ${{ secrets.match_password }}
          match_git_private_key: ${{ secrets.match_ssh_private_key }}  # action expects "git" name; caller passes "ssh" — rename here
          firebase_creds:        ${{ secrets.firebase_creds }}
          tester_groups:         ${{ inputs.tester_groups }}

  stage-1-testflight-internal:
    name: Stage 1 — TestFlight Internal
    # Depend on validate-secrets explicitly (stage-0 only runs for ios platform,
    # so mac platform's stage-1 needs the explicit gate).
    needs: [validate-secrets, stage-0-firebase]
    if: ${{ always() && !failure() && !cancelled() && contains(fromJSON('["internal","beta","production"]'), inputs.starting_rung) }}
    runs-on: ${{ fromJSON(inputs.runner_pool) }}
    environment: ${{ inputs.platform }}-testflight-internal
    env:
      SOPS_AGE_KEY:          ${{ secrets.SOPS_AGE_KEY }}
      APPSTORE_KEY_ID:       ${{ secrets.appstore_key_id }}
      APPSTORE_ISSUER_ID:    ${{ secrets.appstore_issuer_id }}
      APPSTORE_AUTH_KEY_B64: ${{ secrets.appstore_auth_key }}
      MATCH_PASSWORD:        ${{ secrets.match_password }}
      MATCH_GIT_PRIVATE_KEY: ${{ secrets.match_ssh_private_key }}
      FIREBASE_CREDS_B64:    ${{ secrets.firebase_creds }}
    steps:
      - uses: actions/checkout@v4

      - name: Pre-fastlane setup (consumer-provided, pre-materialized mode)
        if: ${{ inputs.mode == 'pre-materialized' && inputs.pre_fastlane_script != '' }}
        shell: bash
        run: ${{ inputs.pre_fastlane_script }}

      - name: Upload to TestFlight Internal (iOS)
        if: inputs.platform == 'ios'
        uses: therajanmaurya/mifos-x-actionhub-publish-apple-kmp/ios-testflight-internal@v2.0.12
        with:
          ios_package_name:      ${{ inputs.package_name }}
          shared_module:         ${{ inputs.shared_module }}
          mode:                  ${{ inputs.mode }}
          fastlane_cwd:          ${{ inputs.fastlane_cwd }}
          appstore_key_id:       ${{ secrets.appstore_key_id }}
          appstore_issuer_id:    ${{ secrets.appstore_issuer_id }}
          appstore_auth_key:     ${{ secrets.appstore_auth_key }}
          match_password:        ${{ secrets.match_password }}
          match_git_private_key: ${{ secrets.match_ssh_private_key }}  # action expects "git" name; caller passes "ssh" — rename here
      # Mac TestFlight Internal — the action requires manual signing certs
      # (NOT Match-based). Required inputs (bundle_identifier, mac_signing_*,
      # mac_installer_*, mac_provisioning_profile_base64, keychain_password)
      # need to be passed by the orchestrator from the consumer's GHA secrets.
      # Until the orchestrator + consumer wire those up, Mac stage will halt
      # at this step with an "unexpected input(s)" error. Track at:
      #   https://github.com/therajanmaurya/mifos-x-actionhub-publish-apple-kmp/issues
      # For now, dispatch with `mac_rung: skip` to avoid this code path.
      - name: Upload to Mac TestFlight Internal (macOS)
        if: inputs.platform == 'mac'
        uses: therajanmaurya/mifos-x-actionhub-publish-apple-kmp/mac-testflight-internal@v2.0.12
        with:
          desktop_package_name:  ${{ inputs.package_name }}
          appstore_key_id:       ${{ secrets.appstore_key_id }}
          appstore_issuer_id:    ${{ secrets.appstore_issuer_id }}
          appstore_auth_key:     ${{ secrets.appstore_auth_key }}
          match_git_private_key: ${{ secrets.match_ssh_private_key }}  # action takes match_git_private_key (even for non-iOS, leftover API)

  stage-2-promote-to-external-beta:
    name: Stage 2 — Promote to TestFlight External (no rebuild)
    needs: [stage-1-testflight-internal]
    if: contains(fromJSON('["beta","production"]'), inputs.starting_rung) && !cancelled() && !failure()
    runs-on: ${{ fromJSON(inputs.runner_pool) }}
    environment: ${{ inputs.platform }}-testflight-external
    steps:
      - uses: actions/checkout@v4
      - name: Promote iOS TF Internal → External
        if: inputs.platform == 'ios'
        uses: therajanmaurya/mifos-x-actionhub-publish-apple-kmp/ios-promote-to-testflight-external@v2.0.12
        with:
          ios_package_name:      ${{ inputs.package_name }}
          appstore_key_id:       ${{ secrets.appstore_key_id }}
          appstore_issuer_id:    ${{ secrets.appstore_issuer_id }}
          appstore_auth_key:     ${{ secrets.appstore_auth_key }}
      - name: Promote Mac TF Internal → External
        if: inputs.platform == 'mac'
        uses: therajanmaurya/mifos-x-actionhub-publish-apple-kmp/mac-promote-to-testflight-external@v2.0.12
        with:
          desktop_package_name:  ${{ inputs.package_name }}
          appstore_key_id:       ${{ secrets.appstore_key_id }}
          appstore_issuer_id:    ${{ secrets.appstore_issuer_id }}
          appstore_auth_key:     ${{ secrets.appstore_auth_key }}

  stage-3-promote-to-app-store:
    name: Stage 3 — Promote to App Store (2 reviewers + wait timer, no rebuild)
    needs: [stage-2-promote-to-external-beta]
    if: inputs.starting_rung == 'production' && !cancelled() && !failure()
    runs-on: ${{ fromJSON(inputs.runner_pool) }}
    environment: ${{ inputs.platform }}-app-store
    steps:
      - uses: actions/checkout@v4
      - name: Promote iOS TF → App Store
        if: inputs.platform == 'ios'
        uses: therajanmaurya/mifos-x-actionhub-publish-apple-kmp/ios-promote-to-app-store@v2.0.12
        with:
          ios_package_name:      ${{ inputs.package_name }}
          appstore_key_id:       ${{ secrets.appstore_key_id }}
          appstore_issuer_id:    ${{ secrets.appstore_issuer_id }}
          appstore_auth_key:     ${{ secrets.appstore_auth_key }}
      - name: Promote Mac TF → Mac App Store
        if: inputs.platform == 'mac'
        uses: therajanmaurya/mifos-x-actionhub-publish-apple-kmp/mac-promote-to-app-store@v2.0.12
        with:
          desktop_package_name:  ${{ inputs.package_name }}
          appstore_key_id:       ${{ secrets.appstore_key_id }}
          appstore_issuer_id:    ${{ secrets.appstore_issuer_id }}
          appstore_auth_key:     ${{ secrets.appstore_auth_key }}
