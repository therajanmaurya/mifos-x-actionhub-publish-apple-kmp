# .github/workflows/pr-check.yaml
#
# Matrix-tests every sub-action's action.yaml + shellcheck on shared scripts.
name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker://rhysd/actionlint:1.7.4
        with:
          args: -color

  validate-sub-actions:
    name: Validate ${{ matrix.subdir }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        subdir:
          - ios-build
          - ios-firebase-distribution
          - ios-testflight-internal
          - ios-promote-to-testflight-external
          - ios-app-store
          - ios-promote-to-app-store
          - mac-build
          - mac-testflight-internal
          - mac-promote-to-testflight-external
          - mac-app-store
          - mac-promote-to-app-store
          - mac-dmg-notarized
          - mac-dmg-unsigned
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -euo pipefail
          test -f "${{ matrix.subdir }}/action.yaml" || { echo "::error::Missing action.yaml"; exit 1; }
          test -f "${{ matrix.subdir }}/README.md"   || { echo "::error::Missing README.md"; exit 1; }
          python3 -c "import yaml; yaml.safe_load(open('${{ matrix.subdir }}/action.yaml'))"

  validate-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find _shared/scripts -name '*.sh' -exec shellcheck -S warning {} +
      # Ruby syntax checked locally before push; rubocop in CI requires sudo

  workflow-tests:
    name: Workflow E2E tests (82 assertions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.4
          sudo mv actionlint /usr/local/bin/
          actionlint --version
      - name: Install Python deps
        run: pip install pyyaml
      - name: Run workflow-tests.sh
        run: bash tests/workflow-tests.sh
      # gem install (or bundler setup) and adds little value at the moment.
      # Re-enable when _shared/lib/*.rb is populated with substantial Ruby.
