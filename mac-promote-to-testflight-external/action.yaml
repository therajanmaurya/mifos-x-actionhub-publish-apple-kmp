# Sub-action: mac-promote-to-testflight-external — MAS Stage 2
# 🆕 NEW. Mac equivalent of iOS-promote-to-testflight-external.
# Consumer Fastfile lane: mac promoteMacToExternalBeta (app_platform: osx)
name: 'KMP Publish Apple — Mac Promote to TF External (MAS Stage 2)'
description: 'Distribute existing Mac TF build to external testers. No rebuild.'
author: 'Mifos Initiative'
branding: { icon: 'users', color: 'yellow' }

inputs:
  desktop_package_name: { required: true,  description: 'Desktop module name' }
  bundle_identifier:    { required: true,  description: 'macOS bundle ID' }
  appstore_key_id:      { required: true,  description: 'ASC API key ID' }
  appstore_issuer_id:   { required: true,  description: 'ASC issuer ID' }
  appstore_auth_key:    { required: true,  description: 'Base64 .p8' }
  build_number:         { required: false, default: '', description: 'Explicit Mac TF build to promote. Default: latest.' }
  external_groups:      { required: false, default: 'External Beta', description: 'Comma-separated TF external groups' }

runs:
  using: 'composite'
  steps:
    - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f  # v1.232.0
      with: { bundler-cache: true }

    - name: Materialize ASC API key
      shell: bash
      env: { APPSTORE_AUTH_KEY_B64: '${{ inputs.appstore_auth_key }}' }
      run: bash "$GITHUB_ACTION_PATH/../_shared/scripts/setup-asc-api.sh"

    - name: Promote Mac TF Internal → External
      shell: bash
      env:
        APPSTORE_KEY_ID:    ${{ inputs.appstore_key_id }}
        APPSTORE_ISSUER_ID: ${{ inputs.appstore_issuer_id }}
        BUILD_NUMBER:       ${{ inputs.build_number }}
        EXTERNAL_GROUPS:    ${{ inputs.external_groups }}
        MAC_APP_IDENTIFIER: ${{ inputs.bundle_identifier }}
      run: bundle exec fastlane mac promoteMacToExternalBeta

    - name: Cleanup
      if: always()
      shell: bash
      run: rm -rf secrets
