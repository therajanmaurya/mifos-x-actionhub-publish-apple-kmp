# Sub-action: ios-app-store — Stage 3 (full rebuild + App Store submit)
# Lifted from openMF/mifos-x-actionhub-publish-ios-on-appstore@v1.0.14
# Hotfix path. Normal Stage 3 = ios-promote-to-app-store (no rebuild).
name: 'KMP Publish Apple — iOS App Store (Stage 3 — full rebuild)'
description: 'Build signed IPA from source + submit to App Store review.'
author: 'Mifos Initiative'
branding: { icon: 'check-circle', color: 'red' }

inputs:
  ios_package_name:      { required: true, description: 'iOS module name' }
  shared_module:         { required: true, description: 'KMP shared module path' }
  use_cocoapods:         { required: false, default: 'false', description: 'Install CocoaPods' }
  appstore_key_id:       { required: true, description: 'ASC API key ID' }
  appstore_issuer_id:    { required: true, description: 'ASC issuer ID' }
  appstore_auth_key:     { required: true, description: 'Base64 .p8' }
  match_password:        { required: true, description: 'Match passphrase' }
  match_git_private_key: { required: true, description: 'SSH key for Match repo' }

runs:
  using: 'composite'
  steps:
    - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f  # v1.232.0
      with: { bundler-cache: true }

    - name: Materialize Apple secrets
      shell: bash
      env:
        APPSTORE_AUTH_KEY_B64: ${{ inputs.appstore_auth_key }}
        MATCH_GIT_PRIVATE_KEY: ${{ inputs.match_git_private_key }}
      run: bash "$GITHUB_ACTION_PATH/../_shared/scripts/materialize-apple-secrets.sh"

    - name: Build + submit to App Store
      shell: bash
      env:
        MATCH_PASSWORD:     ${{ inputs.match_password }}
        APPSTORE_KEY_ID:    ${{ inputs.appstore_key_id }}
        APPSTORE_ISSUER_ID: ${{ inputs.appstore_issuer_id }}
      run: bundle exec fastlane ios release

    - name: Cleanup
      if: always()
      shell: bash
      run: rm -rf secrets
